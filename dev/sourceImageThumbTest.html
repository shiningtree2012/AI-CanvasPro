<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SourceImage Thumb Test</title><style>body{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;background:#0b0b0e;color:#e6e6ea;margin:0;padding:16px}.ok{color:#34d399}.bad{color:#fb7185}</style></head><body><h1 style="margin:0 0 12px 0;font-size:16px;font-weight:700">SourceImage Thumb Test</h1><pre id="out" style="margin:0;white-space:pre-wrap;word-break:break-word"></pre><script type="module">import store from "../src/core/store.js";
    import { generateId } from "../src/core/math.js";
    import { SourceImageNode } from "../components/SourceImageNode.js";

    const outEl = document.getElementById("out");
    function line(text, ok = null) {
      const span = document.createElement("span");
      span.textContent = text + "\n";
      if (ok === true) span.className = "ok";
      if (ok === false) span.className = "bad";
      outEl.appendChild(span);
    }
    function assert(name, cond, detail = "") {
      if (cond) return line("✓ " + name, true);
      line("✗ " + name + (detail ? " — " + detail : ""), false);
    }
    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    const tinyPng =
      "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAOeG8x0AAAAASUVORK5CYII=";

    async function run() {
      store.updateViewport(0, 0, 1);

      const id = generateId("source-image");
      store.addNode({
        id,
        type: "source-image",
        x: 40,
        y: 40,
        width: 160,
        height: 120,
        src: tinyPng,
        thumbUrl: null,
        fixedSize: true
      });

      const nodeData = store.getState().nodes[id];
      const inst = new SourceImageNode(nodeData);
      document.body.appendChild(inst.mount());

      await sleep(600);

      const latest = store.getState().nodes[id];
      assert("生成 thumbUrl", !!latest.thumbUrl, latest.thumbUrl ? "" : "thumbUrl 为空");
      assert("thumbUrl 为 data: URL", String(latest.thumbUrl || "").startsWith("data:image/"), String(latest.thumbUrl || ""));

      store.deleteNodes([id]);
      line("\n完成", true);
    }

    run().catch((e) => line(String(e && e.stack ? e.stack : e), false));</script></body></html>
