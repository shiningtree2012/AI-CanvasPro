<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SourceImage Preload Fail Test</title><style>body{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;background:#0b0b0e;color:#e6e6ea;margin:0;padding:16px}.ok{color:#34d399}.bad{color:#fb7185}</style></head><body><h1 style="margin:0 0 12px 0;font-size:16px;font-weight:700">SourceImage Preload Fail Test</h1><pre id="out" style="margin:0;white-space:pre-wrap;word-break:break-word"></pre><script type="module">import store from "../src/core/store.js";

      outEl.appendChild(span);

      const id = generateId("source-image");

        id,
        type: "source-image",
        x: 40,
        y: 40,
        width: 180,
        height: 140,
        src: "https://file4.aitohumanize.com/file/not-exist.png",
        thumbUrl: tinyPng,
        fixedSize: true
