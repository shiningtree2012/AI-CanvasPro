<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Storyboard Any-Image Push-In Test</title><style>body{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;background:#0b0b0e;color:#e6e6ea;margin:0;padding:16px}.ok{color:#34d399}.bad{color:#fb7185}</style></head><body><h1 style="margin:0 0 12px 0;font-size:16px;font-weight:700">Storyboard Any-Image Push-In Test</h1><pre id="out" style="margin:0;white-space:pre-wrap;word-break:break-word"></pre><script type="module">import store from "../src/core/store.js";
    import { generateId } from "../src/core/math.js";
    import { handlePointerDown, handlePointerMove, handlePointerUp } from "../src/core/interaction.js";

    const outEl = document.getElementById("out");
    function line(text, ok = null) {
      const span = document.createElement("span");
      span.textContent = text + "\n";
      if (ok === true) span.className = "ok";
      if (ok === false) span.className = "bad";
      outEl.appendChild(span);
    }
    function assert(name, cond, detail = "") {
      if (cond) return line("✓ " + name, true);
      line("✗ " + name + (detail ? " — " + detail : ""), false);
    }
    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }
    function makeEmptyCells(cols, rows) {
      const cells = [];
      for (let i = 0; i < cols * rows; i++) {
        cells.push({
          id: generateId("cell"),
          url: "",
          localPath: null,
          thumbUrl: null,
          isEmpty: true,
          col: i % cols,
          row: Math.floor(i / cols),
        });
      }
      return cells;
    }
    function screenPosForStoryboardCell(sb, col, row) {
      const cw = sb.width / sb.cols;
      const ch = sb.height / sb.rows;
      return { x: sb.x + col * cw + cw / 2, y: sb.y + row * ch + ch / 2 };
    }
    function screenPosForNodeCenter(n) {
      return { x: n.x + (n.width || 1) / 2, y: n.y + (n.height || 1) / 2 };
    }

    const tinyPng =
      "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAOeG8x0AAAAASUVORK5CYII=";

    async function run() {
      window.v2Renderer = window.v2Renderer || {};
      window.v2Renderer.nodeInstances = new Map();
      const sbId = generateId("storyboard");
      window.v2Renderer.nodeInstances.set(sbId, { highlightCell: () => {} });

      store.updateViewport(0, 0, 1);
      const cols = 2;
      const rows = 2;
      const sb = {
        id: sbId,
        type: "storyboard",
        x: 200,
        y: 200,
        width: 200,
        height: 200,
        cols,
        rows,
        isEditing: true,
        cells: makeEmptyCells(cols, rows),
      };

      const aiId = generateId("ai-image");
      const aiNode = {
        id: aiId,
        type: "ai-image",
        x: 40,
        y: 40,
        width: 160,
        height: 120,
        imageUrl: tinyPng,
        thumbUrl: tinyPng,
      };

      store.batch(() => {
        store.addNode(sb);
        store.addNode(aiNode);
        store.setSelectedNodes([aiId]);
      });

      const from = screenPosForNodeCenter(aiNode);
      const to = screenPosForStoryboardCell(sb, 0, 0);

      handlePointerDown(from.x, from.y, false, false, null);
      handlePointerMove(to.x, to.y, { buttons: 1 });
      handlePointerUp(to.x, to.y);
      await sleep(80);

      const s = store.getState();
      const c0 = s.nodes[sbId].cells[0];
      assert("ai-image 可注入到 cells", (c0.thumbUrl || c0.url || c0.localPath) === tinyPng);
      assert("ai-image 注入后不删除源节点", !!s.nodes[aiId]);

      store.batch(() => {
        store.deleteNodes([aiId, sbId]);
      });
      line("\n完成", true);
    }

    run().catch((e) => line(String(e && e.stack ? e.stack : e), false));</script></body></html>
